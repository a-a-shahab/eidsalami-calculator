<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — ঈদ সালামি</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">

  <div style="max-width:900px;margin:0 auto;">

    <div class="admin-header">
      <h1>⚙️ Admin Panel
        <span class="live-badge">
          <span class="live-dot"></span> Live
        </span>
      </h1>
      <p style="color:var(--text-muted);font-size:0.85rem;margin-top:6px;">Real-time Firestore — ঈদ সালামি ক্যালকুলেটর</p>
      <a href="index.html" style="color:var(--gold-light);font-size:0.8rem;text-decoration:none;opacity:0.7;">← মূল পেজে যাও</a>
    </div>

    <!-- Stats Row -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">মোট ব্যবহারকারী</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-highest">—</div>
        <div class="stat-label">সর্বোচ্চ সালামি</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-label">গড় সালামি</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="admin-controls">
      <input
        type="text"
        class="admin-search"
        id="search-input"
        placeholder="🔍 নাম দিয়ে খোঁজো..."
      />
      <button class="sort-btn active" id="sort-salami">↓ সর্বোচ্চ সালামি</button>
      <button class="sort-btn" id="sort-latest">🕐 সর্বশেষ</button>
      <button class="delete-btn" id="btn-delete-all">🗑 সব মুছে ফেলো</button>
    </div>

    <!-- Table -->
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>নাম</th>
            <th>টার্গেট নাম</th>
            <th>সালামি (৳)</th>
            <th>IP</th>
            <th>সময়</th>
          </tr>
        </thead>
        <tbody id="admin-tbody">
          <tr><td colspan="6" class="admin-status">লোড হচ্ছে...</td></tr>
        </tbody>
      </table>
    </div>

    <p style="color:var(--text-muted);font-size:0.75rem;text-align:center;margin-top:16px;">
      ডেটা রিয়েল-টাইমে আপডেট হচ্ছে। মোট এন্ট্রি: <span id="entry-count">—</span>
    </p>

  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
