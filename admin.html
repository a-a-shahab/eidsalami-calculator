<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EidSalamiCalculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #111; color: #ffd700; }
        .admin-container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.1); }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #444; }
        th { background: #003300; }
        .search-box { padding: 14px; width: 100%; margin-bottom: 20px; font-size: 1.1rem; }
        .btn-danger { background: #c00; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; }
        .admin-header { text-align: center; margin-bottom: 30px; font-size: 2rem; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">🔧 EidSalamiCalculator Admin Panel</div>
        
        <input type="text" id="search-input" class="search-box glass" placeholder="নাম দিয়ে সার্চ করুন..." onkeyup="filterTable()">
        
        <div style="margin-bottom: 15px;">
            <button onclick="sortTable('salami')" class="primary-btn" style="width:auto; margin-right:10px;">Highest Salami</button>
            <button onclick="sortTable('time')" class="primary-btn" style="width:auto;">Latest First</button>
        </div>
        
        <table id="admin-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Target</th>
                    <th>Salami (৳)</th>
                    <th>IP</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
        </table>
        
        <div style="text-align:center; margin-top:30px;">
            <button onclick="deleteAllData()" class="btn-danger">🗑️ Delete All Data</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
